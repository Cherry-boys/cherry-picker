services:
  postgres:
    image: postgres:17
    container_name: cherrypick-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: cherrypick
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: cherrypick
    ports:
      - "5432:5432"
    volumes:
      - cherrypick_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cherrypick -d cherrypick"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cherrypick_pgdata:
