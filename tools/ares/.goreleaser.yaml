version: 2
project_name: ares-pp-cli
changelog:
  disable: true
builds:
  - id: ares-pp-cli
    main: ./cmd/ares-pp-cli
    binary: ares-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X ares-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: ares-pp-mcp
    main: ./cmd/ares-pp-mcp
    binary: ares-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: ares-pp-cli
    repository:
      owner: patrik-zita
      name: homebrew-tap
    homepage: "https://github.com/patrik-zita/ares-pp-cli"
    description: "Every ARES lookup, plus a local store, offline search, bulk IČO enrichment"
    install: |
      bin.install "ares-pp-cli"
      bin.install "ares-pp-mcp"
